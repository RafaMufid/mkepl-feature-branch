<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <h1>TaskFlow</h1>
        <p class="subtitle">Mini app untuk simulasi Git branching strategy.</p>

        <section class="task-form">
            <input id="taskInput" type="text" placeholder="Tulis tugas baru">
            <button onclick="addTask()">Tambah</button>
        </section>

        <div class="filters">
            <button onclick="setFilter('all')">Semua</button>
            <button onclick="setFilter('active')">Aktif</button>
            <button onclick="setFilter('completed')">Selesai</button>
        </div>

        <button onclick="autoSortTasks()">Urutkan</button>

        <p id="summary">0 tugas</p>
        <ul id="taskList"></ul>
    </main>
    <script src="app.js"></script>
</body>

</html>
